<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - RAKSH-AID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #2c2c2c 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255,107,53,0.2) 0%, transparent 70%);
            border-radius: 50%;
            top: -250px;
            right: -250px;
            animation: float 8s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
            animation: float 10s ease-in-out infinite reverse;
        }
        .welcome-container { text-align: center; color: white; animation: fadeIn 1.2s ease; position: relative; z-index: 10; }
        .logo { 
            font-size: 9rem; 
            margin-bottom: 30px; 
            animation: pulse 2s infinite;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 10px 30px rgba(255,107,53,0.3));
        }
        h1 { 
            font-size: 5rem; 
            margin-bottom: 15px; 
            text-shadow: 0 5px 20px rgba(255,107,53,0.3);
            font-weight: 800;
            letter-spacing: 2px;
        }
        p { 
            font-size: 1.8rem; 
            margin-bottom: 50px; 
            opacity: 0.9;
            font-weight: 300;
        }
        .btn { 
            padding: 20px 60px; 
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%); 
            color: white; 
            border: none; 
            border-radius: 50px; 
            font-size: 1.3rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s; 
            box-shadow: 0 15px 40px rgba(255,107,53,0.4);
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 50px rgba(255,107,53,0.5);
        }
        .btn:active { transform: translateY(-2px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="logo"><i class="fas fa-shield-alt"></i></div>
        <h1>RAKSH-AID</h1>
        <p>Your 24/7 Safety Companion</p>
        <button class="btn" onclick="window.location.href='login.html'">
            <i class="fas fa-arrow-right"></i> Get Started
        </button>
    </div>
</body>
</html>

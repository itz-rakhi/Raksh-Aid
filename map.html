<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location & Nearby Services - RAKSH-AID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }
        .header { background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%); color: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { background: rgba(255, 255, 255, 0.2); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .map-wrapper { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .controls { position: absolute; top: 20px; left: 20px; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 1000; max-width: 300px; }
        .service-filters { display: flex; flex-wrap: wrap; gap: 8px; }
        .filter-btn { padding: 8px 15px; border: 2px solid #2c3e50; background: white; color: #2c3e50; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: all 0.3s; }
        .filter-btn.active { background: #2c3e50; color: white; }
        .location-btn { position: absolute; bottom: 30px; right: 20px; background: white; border: none; padding: 15px; border-radius: 50%; box-shadow: 0 5px 20px rgba(0,0,0,0.2); cursor: pointer; font-size: 1.5rem; color: #2c3e50; z-index: 1000; }
        .report-btn { position: absolute; bottom: 100px; right: 20px; background: #dc3545; border: none; padding: 15px; border-radius: 50%; box-shadow: 0 5px 20px rgba(220,53,69,0.3); cursor: pointer; font-size: 1.5rem; color: white; z-index: 1000; }
        .info-panel { position: absolute; bottom: 20px; left: 20px; background: white; border-radius: 12px; padding: 15px 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); z-index: 1000; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 2000; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; max-width: 400px; width: 90%; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
        .btn-submit { background: #dc3545; color: white; }
        .btn-cancel { background: #6c757d; color: white; }

        /* Travel History Panel */
        .history-toggle { position: absolute; top: 20px; right: 20px; background: white; border: none; padding: 10px 16px; border-radius: 10px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); cursor: pointer; font-size: 0.95rem; font-weight: 600; color: #2c3e50; z-index: 1000; display: flex; align-items: center; gap: 8px; }
        .history-panel { position: absolute; top: 0; right: 0; width: 320px; height: 100%; background: white; box-shadow: -5px 0 20px rgba(0,0,0,0.15); z-index: 1001; display: none; flex-direction: column; overflow: hidden; }
        .history-panel.open { display: flex; }
        .history-header { padding: 16px 20px; background: #2c3e50; color: white; display: flex; justify-content: space-between; align-items: center; }
        .history-header h3 { margin: 0; font-size: 1rem; }
        .history-close { background: none; border: none; color: white; font-size: 1.2rem; cursor: pointer; }
        .history-actions { padding: 12px 16px; display: flex; gap: 8px; border-bottom: 1px solid #eee; }
        .history-actions button { flex: 1; padding: 8px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
        .btn-show-route { background: #667eea; color: white; }
        .btn-clear-history { background: #dc3545; color: white; }
        .history-list { flex: 1; overflow-y: auto; padding: 10px; }
        .history-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px; border-radius: 8px; margin-bottom: 6px; background: #f8f9fa; border-left: 3px solid #667eea; }
        .history-item:first-child { border-left-color: #28a745; }
        .history-item:last-child { border-left-color: #dc3545; }
        .history-dot { width: 10px; height: 10px; border-radius: 50%; background: #667eea; margin-top: 4px; flex-shrink: 0; }
        .history-item:first-child .history-dot { background: #28a745; }
        .history-item:last-child .history-dot { background: #dc3545; }
        .history-info { flex: 1; }
        .history-time { font-size: 0.8rem; font-weight: 700; color: #2c3e50; }
        .history-addr { font-size: 0.75rem; color: #666; margin-top: 2px; line-height: 1.3; }
        .history-coords { font-size: 0.7rem; color: #999; margin-top: 2px; }
        .history-empty { text-align: center; color: #999; padding: 40px 20px; font-size: 0.9rem; }
        .tracking-badge { position: absolute; bottom: 80px; left: 20px; background: #28a745; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; z-index: 1000; display: flex; align-items: center; gap: 6px; }
        .tracking-dot { width: 8px; height: 8px; background: white; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i> Back</button>
        <h1><i class="fas fa-map-marked-alt"></i> RAKSH-AID - Live Location</h1>
    </div>
    <div class="map-wrapper">
        <div id="map"></div>
        <div class="controls">
            <h3><i class="fas fa-filter"></i> Nearby Services</h3>
            <div class="service-filters">
                <button class="filter-btn active" data-type="hospital"><i class="fas fa-hospital"></i> Hospitals</button>
                <button class="filter-btn" data-type="police"><i class="fas fa-shield-alt"></i> Police</button>
                <button class="filter-btn" data-type="fire_station"><i class="fas fa-fire-extinguisher"></i> Fire</button>
                <button class="filter-btn" data-type="pharmacy"><i class="fas fa-pills"></i> Pharmacy</button>
            </div>
            <button class="filter-btn" id="communityBtn" style="width: 100%; margin-top: 10px; background: #17a2b8; color: white; border: none;"><i class="fas fa-map-marked"></i> Community Reports</button>
        </div>
        <button class="history-toggle" id="historyToggle"><i class="fas fa-route"></i> Travel History</button>
        <div class="tracking-badge"><div class="tracking-dot"></div> Tracking ON</div>
        <button class="location-btn" id="centerLocation"><i class="fas fa-crosshairs"></i></button>

        <!-- Travel History Panel -->
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <h3><i class="fas fa-route"></i> Travel History</h3>
                <button class="history-close" id="historyClose"><i class="fas fa-times"></i></button>
            </div>
            <div class="history-actions">
                <button class="btn-show-route" id="showRouteBtn"><i class="fas fa-draw-polygon"></i> Show Route</button>
                <button class="btn-clear-history" id="clearHistoryBtn"><i class="fas fa-trash"></i> Clear</button>
            </div>
            <div class="history-list" id="historyList"><div class="history-empty"><i class="fas fa-map-marker-alt" style="font-size:2rem;display:block;margin-bottom:10px;"></i>No travel history yet.<br>Move around to record your route.</div></div>
        </div>
        <button class="report-btn" id="reportBtn"><i class="fas fa-exclamation-triangle"></i></button>
        <div class="info-panel">
            <i class="fas fa-map-marker-alt"></i>
            <span id="locationText">Getting location...</span>
        </div>
    </div>
    <div id="reportModal" class="modal">
        <div class="modal-content">
            <h2>Report Incident</h2>
            <div class="form-group">
                <label>Incident Type</label>
                <select id="incidentType">
                    <option value="theft">Theft</option>
                    <option value="harassment">Harassment</option>
                    <option value="unsafe">Unsafe Area</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="incidentDesc" rows="3" placeholder="Describe the incident..."></textarea>
            </div>
            <div class="btn-group">
                <button class="btn btn-cancel" onclick="closeReportModal()">Cancel</button>
                <button class="btn btn-submit" onclick="submitReport()">Submit</button>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, userMarker, userLocation, markers = [], routePolyline = null;
        let activeFilter = 'hospital';
        const HISTORY_KEY = 'travelHistory';

        function saveTravelPoint(lat, lng) {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            history.push({ lat, lng, time: new Date().toISOString() });
            // Keep last 200 points
            if (history.length > 200) history.splice(0, history.length - 200);
            localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
            renderHistoryList();
        }

        function renderHistoryList() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            const list = document.getElementById('historyList');
            if (!history.length) {
                list.innerHTML = '<div class="history-empty"><i class="fas fa-map-marker-alt" style="font-size:2rem;display:block;margin-bottom:10px;"></i>No travel history yet.<br>Move around to record your route.</div>';
                return;
            }
            // Show newest first
            list.innerHTML = [...history].reverse().map((p, i) => {
                const d = new Date(p.time);
                const dateStr = d.toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });
                const timeStr = d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
                return `<div class="history-item">
                    <div class="history-dot"></div>
                    <div class="history-info">
                        <div class="history-time"><i class="fas fa-clock" style="margin-right:4px;"></i>${dateStr} &nbsp; ${timeStr}</div>
                        <div class="history-coords"><i class="fas fa-map-pin" style="margin-right:4px;"></i>${p.lat.toFixed(5)}, ${p.lng.toFixed(5)}</div>
                    </div>
                </div>`;
            }).join('');
        }

        function showRoute() {
            const history = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            if (history.length < 2) { alert('Need at least 2 points to draw route.'); return; }
            if (routePolyline) map.removeLayer(routePolyline);
            const latlngs = history.map(p => [p.lat, p.lng]);
            routePolyline = L.polyline(latlngs, { color: '#667eea', weight: 4, opacity: 0.8, dashArray: '8,4' }).addTo(map);
            // Start marker (green)
            L.circleMarker(latlngs[0], { radius: 8, color: '#28a745', fillColor: '#28a745', fillOpacity: 1 }).addTo(map).bindPopup(`<strong>Start</strong><br>${new Date(history[0].time).toLocaleString()}`);
            // End marker (red)
            L.circleMarker(latlngs[latlngs.length-1], { radius: 8, color: '#dc3545', fillColor: '#dc3545', fillOpacity: 1 }).addTo(map).bindPopup(`<strong>Latest</strong><br>${new Date(history[history.length-1].time).toLocaleString()}`);
            map.fitBounds(routePolyline.getBounds(), { padding: [40, 40] });
        }

        function initMap() {
            navigator.geolocation.getCurrentPosition(position => {
                userLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
                map = L.map('map').setView([userLocation.lat, userLocation.lng], 14);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);
                userMarker = L.marker([userLocation.lat, userLocation.lng]).addTo(map).bindPopup('You are here').openPopup();
                L.circle([userLocation.lat, userLocation.lng], { color: '#4285F4', fillColor: '#4285F4', fillOpacity: 0.15, radius: 100 }).addTo(map);
                searchNearbyPlaces(activeFilter);
                updateLocationText(userLocation);
                saveTravelPoint(userLocation.lat, userLocation.lng);
                // Track every 30 seconds
                setInterval(() => {
                    navigator.geolocation.getCurrentPosition(pos => {
                        saveTravelPoint(pos.coords.latitude, pos.coords.longitude);
                        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                        if (userMarker) userMarker.setLatLng([userLocation.lat, userLocation.lng]);
                    });
                }, 30000);
            }, error => {
                document.getElementById('map').innerHTML = '<div style="display: flex; align-items: center; justify-content: center; height: 100%; flex-direction: column; gap: 15px;"><i class="fas fa-location-slash" style="font-size: 4rem; color: #dc3545;"></i><h3>Enable Location Services</h3></div>';
            });
        }

        function searchNearbyPlaces(type) {
            clearMarkers();
            const query = `[out:json];(node["amenity"="${type}"](around:5000,${userLocation.lat},${userLocation.lng}););out body;`;
            fetch('https://overpass-api.de/api/interpreter', { method: 'POST', body: query })
                .then(r => r.json())
                .then(data => {
                    if (data.elements) {
                        data.elements.slice(0, 15).forEach(place => {
                            const marker = L.marker([place.lat, place.lon], {
                                icon: L.divIcon({ className: 'service-marker', html: `<div style="font-size: 24px;">${{hospital:'🏥',police:'🚓',fire_station:'🚒',pharmacy:'💊'}[type]}</div>`, iconSize: [30, 30] })
                            }).addTo(map);
                            const dist = ((6371 * 2 * Math.atan2(Math.sqrt(Math.sin(((place.lat-userLocation.lat)*Math.PI/180)/2)**2 + Math.cos(userLocation.lat*Math.PI/180)*Math.cos(place.lat*Math.PI/180)*Math.sin(((place.lon-userLocation.lng)*Math.PI/180)/2)**2), Math.sqrt(1-(Math.sin(((place.lat-userLocation.lat)*Math.PI/180)/2)**2 + Math.cos(userLocation.lat*Math.PI/180)*Math.cos(place.lat*Math.PI/180)*Math.sin(((place.lon-userLocation.lng)*Math.PI/180)/2)**2))))).toFixed(2);
                            marker.bindPopup(`<strong>${place.tags.name || 'Unknown'}</strong><br>${dist} km<br><a href="https://www.openstreetmap.org/directions?from=${userLocation.lat},${userLocation.lng}&to=${place.lat},${place.lon}" target="_blank" style="padding: 8px 15px; background: #667eea; color: white; text-decoration: none; border-radius: 8px;">Directions</a>`);
                            markers.push(marker);
                        });
                    }
                });
        }

        function clearMarkers() { markers.forEach(m => map.removeLayer(m)); markers = []; }

        function updateLocationText(loc) {
            fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${loc.lat}&lon=${loc.lng}`)
                .then(r => r.json())
                .then(data => document.getElementById('locationText').textContent = data.display_name.split(',').slice(0, 2).join(','));
        }

        function showCommunityReports() {
            const incidents = JSON.parse(localStorage.getItem('communityIncidents')) || [];
            const colors = { theft: '#dc3545', harassment: '#fd7e14', unsafe: '#ffc107' };
            incidents.forEach(i => L.circleMarker([i.lat, i.lng], { color: colors[i.type], fillColor: colors[i.type], fillOpacity: 0.6, radius: 10 }).addTo(map).bindPopup(`<strong>${i.type.toUpperCase()}</strong><br>${i.description}<br><small>${new Date(i.time).toLocaleString()}</small>`));
            if (!incidents.length) alert('No community reports yet');
        }

        function closeReportModal() { document.getElementById('reportModal').classList.remove('active'); }

        function submitReport() {
            const type = document.getElementById('incidentType').value;
            const desc = document.getElementById('incidentDesc').value;
            if (!desc) { alert('Please add description'); return; }
            const incidents = JSON.parse(localStorage.getItem('communityIncidents')) || [];
            incidents.push({ type, description: desc, lat: userLocation.lat, lng: userLocation.lng, time: new Date().toISOString() });
            localStorage.setItem('communityIncidents', JSON.stringify(incidents));
            const zones = JSON.parse(localStorage.getItem('unsafeZones')) || [];
            zones.push({ lat: userLocation.lat, lng: userLocation.lng });
            localStorage.setItem('unsafeZones', JSON.stringify(zones));
            closeReportModal();
            alert('Report submitted!');
            showCommunityReports();
        }

        document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activeFilter = btn.dataset.type;
            if (activeFilter) searchNearbyPlaces(activeFilter);
        }));

        document.getElementById('historyToggle').addEventListener('click', () => { document.getElementById('historyPanel').classList.add('open'); renderHistoryList(); });
        document.getElementById('historyClose').addEventListener('click', () => document.getElementById('historyPanel').classList.remove('open'));
        document.getElementById('showRouteBtn').addEventListener('click', showRoute);
        document.getElementById('clearHistoryBtn').addEventListener('click', () => { if (confirm('Clear all travel history?')) { localStorage.removeItem(HISTORY_KEY); if (routePolyline) { map.removeLayer(routePolyline); routePolyline = null; } renderHistoryList(); } });
        document.getElementById('centerLocation').addEventListener('click', () => map.setView([userLocation.lat, userLocation.lng], 14));
        document.getElementById('communityBtn').addEventListener('click', showCommunityReports);
        document.getElementById('reportBtn').addEventListener('click', () => document.getElementById('reportModal').classList.add('active'));

        initMap();
    </script>
</body>
</html>

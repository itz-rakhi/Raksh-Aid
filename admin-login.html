<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - RAKSH-AID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .admin-login { background: rgba(255,255,255,0.95); padding: 50px; border-radius: 25px; box-shadow: 0 25px 80px rgba(255,0,0,0.3); max-width: 400px; width: 90%; }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 4rem; color: #dc3545; margin-bottom: 10px; }
        .logo h1 { color: #1a1a1a; font-size: 2rem; margin-bottom: 5px; }
        .logo p { color: #dc3545; font-weight: 600; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #1a1a1a; font-weight: 600; }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #dc3545; }
        input { width: 100%; padding: 15px 15px 15px 45px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem; }
        input:focus { outline: none; border-color: #dc3545; box-shadow: 0 0 0 4px rgba(220,53,69,0.1); }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #dc3545 0%, #c82333 100%); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 12px 30px rgba(220,53,69,0.4); }
        .error { color: #dc3545; font-size: 0.9rem; margin-top: 8px; display: none; padding: 10px; background: rgba(220,53,69,0.1); border-radius: 8px; }
    </style>
</head>
<body>
    <div class="admin-login">
        <div class="logo">
            <i class="fas fa-user-shield"></i>
            <h1>Admin Access</h1>
            <p>RAKSH-AID Control Panel</p>
        </div>
        <form id="adminLoginForm">
            <div class="form-group">
                <label>Admin Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user-shield"></i>
                    <input type="text" id="adminUsername" value="admin" required>
                </div>
            </div>
            <div class="form-group">
                <label>Admin Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="adminPassword" required>
                </div>
                <div class="error" id="adminError"></div>
            </div>
            <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Admin Login</button>
        </form>
    </div>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            if (username === 'admin' && password === 'Admin@19') {
                localStorage.setItem('adminAuth', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                const error = document.getElementById('adminError');
                error.textContent = '❌ Invalid admin credentials';
                error.style.display = 'block';
            }
        });

        if (localStorage.getItem('adminAuth') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }
    </script>
</body>
</html>

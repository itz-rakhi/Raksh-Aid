<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RAKSH-AID</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 50%, #2c2c2c 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255,107,53,0.15) 0%, transparent 70%);
            border-radius: 50%;
            top: -200px;
            right: -200px;
            animation: float 6s ease-in-out infinite;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            animation: float 8s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }
        .login-container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 50px 45px; 
            border-radius: 25px; 
            box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 100px rgba(255,107,53,0.1); 
            max-width: 450px; 
            width: 90%;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            animation: slideIn 0.6s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { text-align: center; margin-bottom: 35px; }
        .logo i { 
            font-size: 5rem; 
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .logo h1 { 
            color: #1a1a1a; 
            font-size: 2.5rem; 
            margin-bottom: 8px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .logo p { color: #666; font-size: 1rem; font-weight: 500; }
        .tabs { 
            display: flex; 
            margin-bottom: 35px; 
            background: #f5f5f5;
            border-radius: 15px;
            padding: 5px;
            gap: 5px;
        }
        .tab { 
            flex: 1; 
            padding: 15px; 
            text-align: center; 
            cursor: pointer; 
            color: #666; 
            font-weight: 600; 
            transition: all 0.3s;
            border-radius: 12px;
            font-size: 1.05rem;
        }
        .tab.active { 
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(255,107,53,0.3);
            transform: translateY(-2px);
        }
        .form-group { margin-bottom: 25px; }
        .form-group label { 
            display: block; 
            margin-bottom: 10px; 
            color: #1a1a1a; 
            font-weight: 600; 
            font-size: 0.95rem;
        }
        .input-wrapper { position: relative; }
        .input-wrapper i { 
            position: absolute; 
            left: 18px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: #ff6b35;
            font-size: 1.1rem;
        }
        .form-group input { 
            width: 100%; 
            padding: 15px 18px 15px 50px; 
            border: 2px solid #e0e0e0; 
            border-radius: 12px; 
            font-size: 1rem; 
            transition: all 0.3s;
            background: #fafafa;
        }
        .form-group input:focus { 
            outline: none; 
            border-color: #ff6b35;
            background: white;
            box-shadow: 0 0 0 4px rgba(255,107,53,0.1);
        }
        .btn { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(255,107,53,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:hover { 
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255,107,53,0.4);
        }
        .btn:active { transform: translateY(-1px); }
        .error { 
            color: #e74c3c; 
            font-size: 0.9rem; 
            margin-top: 8px; 
            display: none;
            padding: 10px;
            background: rgba(231,76,60,0.1);
            border-radius: 8px;
            border-left: 3px solid #e74c3c;
        }
        .success { 
            color: #27ae60; 
            font-size: 0.9rem; 
            margin-top: 8px; 
            display: none;
            padding: 10px;
            background: rgba(39,174,96,0.1);
            border-radius: 8px;
            border-left: 3px solid #27ae60;
        }
        #registerForm { display: none; }
        @media (max-width: 480px) {
            .login-container { padding: 35px 25px; }
            .logo h1 { font-size: 2rem; }
            .logo i { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-shield-alt"></i>
            <h1>RAKSH-AID</h1>
            <p>Your 24/7 Safety Companion</p>
        </div>
        
        <div class="tabs">
            <div class="tab active" onclick="showLogin()">Login</div>
            <div class="tab" onclick="showRegister()">Register</div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" required>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" required>
                </div>
                <div class="error" id="loginError"></div>
            </div>
            <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>

        <form id="registerForm">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="registerName" required>
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="registerEmail" required>
                </div>
            </div>
            <div class="form-group">
                <label>Blood Group</label>
                <div class="input-wrapper">
                    <i class="fas fa-tint"></i>
                    <select id="registerBloodGroup" style="width: 100%; padding: 15px 18px 15px 50px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 1rem; background: #fafafa;" required>
                        <option value="">Select Blood Group</option>
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="registerPassword" required minlength="6">
                </div>
                <div class="error" id="registerError"></div>
                <div class="success" id="registerSuccess"></div>
            </div>
            <button type="submit" class="btn"><i class="fas fa-user-plus"></i> Register</button>
        </form>
    </div>

    <script src="api-service.js"></script>
    <script>
        function showLogin() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }

        function showRegister() {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const result = await apiService.login(email, password);
            
            if (result.success) {
                localStorage.setItem('currentUser', JSON.stringify(result.user));
                window.location.href = 'index.html';
            } else {
                const errorDiv = document.getElementById('loginError');
                errorDiv.textContent = '❌ ' + result.error;
                errorDiv.style.display = 'block';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const bloodGroup = document.getElementById('registerBloodGroup').value;
            const password = document.getElementById('registerPassword').value;
            
            const result = await apiService.register(name, email, password, bloodGroup);
            
            if (result.success) {
                const success = document.getElementById('registerSuccess');
                success.textContent = '✅ Registration successful! Please login.';
                success.style.display = 'block';
                
                setTimeout(() => {
                    showLogin();
                    document.getElementById('loginEmail').value = email;
                }, 1500);
            } else {
                const errorDiv = document.getElementById('registerError');
                errorDiv.textContent = '❌ ' + result.error;
                errorDiv.style.display = 'block';
            }
        });

        if (localStorage.getItem('currentUser')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
